groups:
  - name: breeze-api-alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="breeze-api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="breeze-api"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate on Breeze API"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
          runbook_url: "https://docs.breeze.local/runbooks/high-error-rate"

      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="breeze-api"}[5m])) by (le)
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Slow response times on Breeze API"
          description: "95th percentile response time is {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.breeze.local/runbooks/slow-response"

      - alert: APIServiceDown
        expr: up{job="breeze-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Breeze API service is down"
          description: "The API service has been unreachable for more than 2 minutes"
          runbook_url: "https://docs.breeze.local/runbooks/api-down"

      - alert: EndpointLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="breeze-api"}[5m])) by (le, route)
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on endpoint {{ $labels.route }}"
          description: "95th percentile latency is {{ $value | humanizeDuration }}"

      - alert: High4xxRate
        expr: |
          (
            sum(rate(http_requests_total{job="breeze-api", status=~"4.."}[5m]))
            /
            sum(rate(http_requests_total{job="breeze-api"}[5m]))
          ) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High rate of 4xx errors"
          description: "4xx error rate is {{ $value | humanizePercentage }}"

  - name: breeze-infrastructure-alerts
    interval: 30s
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for more than 2 minutes"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis is using {{ $value | humanizePercentage }} of available memory"

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL has been unreachable for more than 2 minutes"

      - alert: PostgresConnectionPoolSaturated
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool is saturated"
          description: "{{ $value | humanizePercentage }} of connections are in use"

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
           / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.mountpoint }}"
          description: "Only {{ $value | humanizePercentage }} of disk space remaining"

  - name: breeze-business-alerts
    interval: 1m
    rules:
      - alert: NoAgentHeartbeats
        expr: |
          sum(rate(agent_heartbeat_total{job="breeze-api"}[5m])) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No agent heartbeats received"
          description: "No agents have checked in for the last 5 minutes"

      - alert: AlertProcessingBacklog
        expr: |
          breeze_alert_queue_length > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Alert processing backlog detected"
          description: "{{ $value }} alerts waiting to be processed"

      - alert: BackupDispatchFailuresDetected
        expr: |
          increase(breeze_backup_dispatch_failures_total{job="breeze-api"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backup or restore start failures detected"
          description: "{{ $value }} backup, restore, or verification start failure(s) occurred in the last 15 minutes"

      - alert: RestoreTimeoutsDetected
        expr: |
          increase(breeze_restore_timeouts_total{job="breeze-api"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Restore commands are timing out"
          description: "{{ $value }} restore command timeout(s) occurred in the last 15 minutes"

      - alert: ScheduledVerificationSkipsDetected
        expr: |
          increase(breeze_backup_verification_skips_total{job="breeze-api"}[1h]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Scheduled backup verification runs are being skipped"
          description: "{{ $value }} scheduled verification skip(s) occurred in the last hour"

  # Anomaly-detection alerts (launch-readiness CRITICAL #5). Thresholds are
  # deliberately coarse starting points — tune after observing real baselines
  # in production. The `tenant` label is redacted unless METRICS_INCLUDE_ORG_ID
  # is enabled, so the `by (tenant)` breakdown collapses to a single series in
  # the default (redacted) configuration and these still fire on aggregate.
  - name: breeze-anomaly-alerts
    interval: 1m
    rules:
      - alert: FailedLoginSpike
        expr: |
          sum(increase(breeze_failed_logins_total{job="breeze-api"}[5m])) by (tenant) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated failed-login rate (possible credential stuffing)"
          description: "{{ $value }} failed logins in 5m for tenant {{ $labels.tenant }} — investigate for credential stuffing / brute force"
          runbook_url: "https://docs.breeze.local/runbooks/failed-login-spike"

      - alert: EnrollmentSpike
        expr: |
          sum(increase(breeze_agent_enrollments_total{job="breeze-api"}[10m])) by (tenant) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unusual agent-enrollment rate"
          description: "{{ $value }} enrollment attempts in 10m for tenant {{ $labels.tenant }} — verify this matches an expected rollout, not a leaked enrollment key"
          runbook_url: "https://docs.breeze.local/runbooks/enrollment-spike"

      - alert: CommandDispatchSpike
        expr: |
          sum(increase(breeze_commands_dispatched_total{job="breeze-api"}[5m])) by (tenant) > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unusual command-dispatch rate"
          description: "{{ $value }} commands dispatched in 5m for tenant {{ $labels.tenant }} — possible compromised account fanning out commands"
          runbook_url: "https://docs.breeze.local/runbooks/command-dispatch-spike"

  - name: breeze-recording-rules
    interval: 30s
    rules:
      - record: breeze:http_requests:rate5m
        expr: sum(rate(http_requests_total{job="breeze-api"}[5m])) by (status, method, route)

      - record: breeze:http_error_rate:ratio5m
        expr: |
          sum(rate(http_requests_total{job="breeze-api", status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="breeze-api"}[5m]))

      - record: breeze:http_request_duration:avg5m
        expr: |
          sum(rate(http_request_duration_seconds_sum{job="breeze-api"}[5m])) by (route)
          /
          sum(rate(http_request_duration_seconds_count{job="breeze-api"}[5m])) by (route)

      - record: breeze:http_request_duration:p95_5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="breeze-api"}[5m])) by (le)
          )

      - record: breeze:http_request_duration:p99_5m
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="breeze-api"}[5m])) by (le)
          )

      - record: breeze:devices:active_count
        expr: sum(breeze_active_devices)

      - record: breeze:backup_dispatch_failures:increase15m
        expr: sum(increase(breeze_backup_dispatch_failures_total{job="breeze-api"}[15m])) by (operation, reason)

      - record: breeze:restore_timeouts:increase15m
        expr: sum(increase(breeze_restore_timeouts_total{job="breeze-api"}[15m])) by (command_type)

      - record: breeze:backup_verification_skips:increase1h
        expr: sum(increase(breeze_backup_verification_skips_total{job="breeze-api"}[1h])) by (verification_type, reason)

      - record: breeze:http_requests:rate5m_by_org
        expr: sum(rate(http_requests_total{job="breeze-api"}[5m])) by (org_id)

      - record: breeze:redis_ops:rate5m
        expr: sum(rate(redis_commands_processed_total[5m]))

      - record: breeze:postgres_query_duration:avg5m
        expr: |
          rate(pg_stat_statements_seconds_total[5m])
          /
          rate(pg_stat_statements_calls_total[5m])

      - record: breeze:failed_logins:increase5m
        expr: sum(increase(breeze_failed_logins_total{job="breeze-api"}[5m])) by (reason, tenant)

      - record: breeze:agent_enrollments:increase10m
        expr: sum(increase(breeze_agent_enrollments_total{job="breeze-api"}[10m])) by (result, tenant)

      - record: breeze:commands_dispatched:increase5m
        expr: sum(increase(breeze_commands_dispatched_total{job="breeze-api"}[5m])) by (type, actor, tenant)
