name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.21.2"
          asset="gitleaks_${version}_linux_x64.tar.gz"
          checksums="gitleaks_${version}_checksums.txt"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          curl -sSfL -o "$workdir/$asset" "$base_url/$asset"
          curl -sSfL -o "$workdir/$checksums" "$base_url/$checksums"
          (cd "$workdir" && grep "  ${asset}$" "$checksums" | sha256sum -c -)
          tar -xzf "$workdir/$asset" -C "$workdir" gitleaks
          sudo install -m 0755 "$workdir/gitleaks" /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  confidential:
    name: Confidential info
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Non-bypassable backstop for the .githooks/pre-commit scan: catches prod
      # infra identifiers (IPs, DB cluster ids) that gitleaks does not model.
      # The exact-value denylist is supplied out-of-band via a repo secret so
      # the values never live in this public repo. Absent the secret, the
      # pattern checks still run.
      - name: Scan for confidential identifiers
        env:
          CONFIDENTIAL_DENYLIST: ${{ secrets.CONFIDENTIAL_DENYLIST }}
        run: |
          set -euo pipefail
          if [[ -n "${CONFIDENTIAL_DENYLIST:-}" ]]; then
            deny="$(mktemp)"
            printf '%s\n' "$CONFIDENTIAL_DENYLIST" > "$deny"
            export CONFIDENTIAL_DENYLIST_FILE="$deny"
          fi
          bash scripts/security/scan-confidential.sh --all
