name: AI Doc Review

on:
  workflow_dispatch: # disabled automatic trigger — bot was clobbering docs files
  # pull_request:
  #   types: [closed]
  #   branches: [main]

jobs:
  review:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Get PR diff
        run: gh pr diff "$PR_NUMBER" > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Run doc review
        run: node scripts/docs-review/review.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          DIFF_FILE: /tmp/pr.diff

      - name: Commit docs directly to main
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if git diff --quiet; then
            echo "No doc changes needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps/docs/
          git commit -m "docs: auto-update from PR #${PR_NUMBER}"
          git push origin main
