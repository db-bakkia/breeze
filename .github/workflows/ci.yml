name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'apps/docs/**'
      - '**/*.md'
      - '**/*.mdx'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'apps/docs/**'
      - '**/*.md'
      - '**/*.mdx'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.34.5'
  GO_VERSION: '1.25.12'

# SR-007: least-privilege default. CI runs on every PR (including forks) and
# only needs to read the repo. Any job needing more must opt in per-job.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Guard production compose defaults
        run: |
          if [ -e docker-compose.override.yml ]; then
            echo "docker-compose.override.yml must not be tracked or present in CI; Compose auto-loads it for production defaults."
            exit 1
          fi

      - name: Guard guided setup behavior
        run: |
          bash scripts/check-guided-setup-compose-rewrites.sh
          bash scripts/check-guided-setup-default-project.sh
          bash scripts/check-guided-setup-db-urls.sh
          bash scripts/check-guided-setup-env-roundtrip.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Test community README automation
        run: pnpm test:community-readme

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check for schema drift
        working-directory: apps/api
        continue-on-error: true
        run: pnpm db:check-drift

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      # tsc on the full apps/api project (dense Drizzle types) + astro check
      # exceed Node's default heap on the type-heaviest branches. Give the
      # type checker a larger old-space so it doesn't OOM. See release-prep OOM.
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit --project apps/api/tsconfig.json

      - name: Run Astro check
        working-directory: apps/web
        run: pnpm exec astro check

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test extension SDK
        run: pnpm --filter @breeze/extension-sdk test

      - name: Type-check extension SDK
        run: pnpm --filter @breeze/extension-sdk typecheck

      - name: Test legacy extension adapter
        run: pnpm --filter @breeze/extension-api test

      - name: Type-check legacy extension adapter
        run: pnpm --filter @breeze/extension-api typecheck

      - name: Run API tests
        run: pnpm test --filter=@breeze/api

      - name: Run load-test static contract tests
        run: pnpm test:load-static

      # Keep this explicit even though the API unit suite also discovers the
      # test. It is the release gate for the checked-in SDK v1 fixture and must
      # remain until the documented v1 compatibility window closes.
      - name: Gate SDK v1 compatibility fixture
        run: pnpm --filter=@breeze/api test --run src/extensions/compatibility.test.ts

      # Site-scope contract tests are pure static analysis (walk routes/*.ts
      # from disk, no DB/Redis), so they run here in the fast, blocking job
      # rather than the non-blocking smoke-test. Guards both the `:deviceId`-URL
      # coverage and the input-sourced/list-style detector against regressions.
      - name: Run site-scope coverage contract test
        run: pnpm --filter=@breeze/api test:site-scope-coverage

      # RLS session-context contract test (vitest.config.rls.ts). Gates the
      # APPLICATION half of the tenant-isolation contract: that
      # withDbAccessContext stamps exactly the `breeze.*` GUCs the RLS helpers
      # read, with the right fail-closed values, and that a nested context does
      # not re-open a transaction and overwrite the outer tenant scope.
      #
      # Until 2026-07 this file was run by NOTHING: no package.json script
      # referenced its config, the unit runner excludes `__tests__/integration/**`,
      # and the integration runner excludes it by name. It sat with a failing
      # assertion (5 vs the 6 GUCs actually set) for a month. Hence this step.
      #
      # It belongs HERE, not in `integration-test`: it mocks `postgres` and
      # `drizzle-orm/postgres-js` and touches no database, so — exactly like the
      # site-scope step above — it runs in the fast, blocking job. Giving it a
      # Postgres service it never connects to would be theatre. The DB half of
      # the contract (real Postgres, unprivileged `breeze_app` role, so RLS is
      # actually enforced rather than bypassed by a superuser) is gated by
      # `test:integration`, `test:request-db-role` and `test:rls-coverage` in the
      # blocking `integration-test` job.
      - name: Run RLS session-context contract test
        run: pnpm --filter=@breeze/api test:rls

  test-m365-graph-read-executor:
    name: Test M365 Graph Read Executor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run executor tests
        run: pnpm --filter=@breeze/m365-graph-read-executor test:run

  # Real-Postgres apply of every migration against an empty database.
  # Catches ordering bugs (issue #506) and any SQL error the static
  # autoMigrate.test.ts cannot see. Cheap (~1 min) and blocking on PRs.
  check-migrations:
    name: Check Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: breeze
          POSTGRES_PASSWORD: breeze
          POSTGRES_DB: breeze
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U breeze"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://breeze:breeze@localhost:5432/breeze
      POSTGRES_PASSWORD: breeze
      # Seed runs at the end of autoMigrate when users is empty.
      # Provide non-secret CI values so it doesn't bail on missing env.
      JWT_SECRET: ci-check-migrations-jwt-secret-not-used-in-prod
      APP_ENCRYPTION_KEY: ci-check-migrations-app-key-32bytes-padding
      MFA_ENCRYPTION_KEY: ci-check-migrations-mfa-key-32bytes-padding
      AGENT_ENROLLMENT_SECRET: ci-check-migrations-agent-enrollment-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Migrating an EMPTY DB below cannot catch edits to already-shipped
      # migrations (no recorded checksums to mismatch) — but autoMigrate
      # refuses to boot on them in prod. Enforce immutability statically.
      - name: Shipped-migration immutability guard
        run: bash scripts/check-migration-immutability.sh

      - name: Apply migrations against empty Postgres
        run: pnpm --filter @breeze/api run check:migrations

  # Real-Postgres apply of every migration as a NON-SUPERUSER role that mirrors
  # a managed-Postgres admin (DigitalOcean doadmin / AWS RDS). The class-complete
  # guard against superuser-only DDL: `check-migrations` above (and every
  # integration shard) migrates as the container superuser, which silently
  # tolerates statements prod's non-superuser role cannot run, then prod
  # crash-loops on boot. This has shipped twice — v0.95.0 (ALTER FUNCTION ...
  # OWNER TO) and v0.97.0 (SET breeze.scope GUC attribute). Cheap (~1 min) and
  # blocking on PRs. See apps/api/scripts/check-migrations-nonsuperuser.ts.
  check-migrations-nonsuperuser:
    name: Check Migrations (non-superuser)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # The superuser connection is used ONLY to provision the non-superuser
      # migration role + its owned database; the migration set itself runs as
      # breeze_migrator (NOSUPERUSER). See the script for the role attributes.
      SUPERUSER_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      MIGRATOR_PASSWORD: migrator
      # The migration role (non-superuser) and the unprivileged request role.
      # Set statically so src/db/index.ts resolves them at module-load time.
      DATABASE_URL: postgresql://breeze_migrator:migrator@localhost:5432/breeze
      DATABASE_URL_APP: postgresql://breeze_app:breeze_app_ci@localhost:5432/breeze
      # breeze_app password (ensureAppRole reads BREEZE_APP_DB_PASSWORD first);
      # must match the password in DATABASE_URL_APP above.
      BREEZE_APP_DB_PASSWORD: breeze_app_ci
      # Seed runs at the end of autoMigrate when users is empty; provide
      # non-secret CI values so it doesn't bail on missing env.
      JWT_SECRET: ci-nonsuperuser-migrations-jwt-secret-not-used-in-prod
      APP_ENCRYPTION_KEY: ci-nonsuperuser-migrations-app-key-32bytes-pad
      MFA_ENCRYPTION_KEY: ci-nonsuperuser-migrations-mfa-key-32bytes-pad
      AGENT_ENROLLMENT_SECRET: ci-nonsuperuser-migrations-agent-enrollment
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations as a non-superuser role
        run: pnpm --filter @breeze/api run check:migrations:nonsuperuser

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web tests
        run: pnpm test --filter=@breeze/web

  test-portal:
    name: Test Portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Portal tests
        run: pnpm test --filter=@breeze/portal

  test-office-addin-core:
    name: Test Office Add-in Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Office Add-in Core tests
        run: pnpm test --filter=@breeze/office-addin-core

      - name: Typecheck Office Add-in Core
        run: pnpm --filter=@breeze/office-addin-core typecheck

  test-excel-addin:
    name: Test Excel Add-in
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Excel Add-in tests
        run: pnpm test --filter=@breeze/excel-addin

  test-word-addin:
    name: Test Word Add-in
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Word Add-in tests
        run: pnpm test --filter=@breeze/word-addin

      - name: Typecheck Word Add-in
        run: pnpm --filter=@breeze/word-addin exec tsc --noEmit

  test-powerpoint-addin:
    name: Test PowerPoint Add-in
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run PowerPoint Add-in tests
        run: pnpm test --filter=@breeze/powerpoint-addin

      - name: Typecheck PowerPoint Add-in
        run: pnpm --filter=@breeze/powerpoint-addin exec tsc --noEmit

      - name: Office add-ins use distinct dev ports + manifest GUIDs
        run: |
          set -euo pipefail
          ports=$(grep -hoE 'port: [0-9]+' apps/*-addin/vite.config.ts | grep -oE '[0-9]+' | sort)
          guids=$(grep -hoE "ADDIN_MANIFEST_ID \?\? '[0-9a-f-]+'" apps/*-addin/scripts/generate-manifest.mjs | grep -oE "[0-9a-f]{8}-[0-9a-f-]+" | sort)
          if [ "$(echo "$ports" | wc -l)" != "$(echo "$ports" | uniq | wc -l)" ]; then echo "Duplicate dev port across Office add-ins:"; echo "$ports"; exit 1; fi
          if [ "$(echo "$guids" | wc -l)" != "$(echo "$guids" | uniq | wc -l)" ]; then echo "Duplicate manifest GUID across Office add-ins (Office caches collided GUIDs as one add-in):"; echo "$guids"; exit 1; fi
          echo "OK — distinct ports and GUIDs across all Office add-ins."

  test-outlook-addin:
    name: Test Outlook Add-in
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Outlook Add-in tests
        run: pnpm test --filter=@breeze/outlook-addin

      - name: Typecheck Outlook Add-in
        run: pnpm --filter=@breeze/outlook-addin exec tsc --noEmit

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Dependency audit. Uses osv-scanner against pnpm-lock.yaml because npm
      # retired the /-/npm/v1/security/audits{,/quick} endpoints (HTTP 410) and
      # pnpm has not migrated to the bulk advisory endpoint at any version, so
      # `pnpm audit` now fails closed everywhere.
      #
      # Gate stays at `critical`, matching the previous `--audit-level=critical`.
      # The earlier `--prod` scoping existed to dodge a HIGH `ip@<=2.0.1`
      # (GHSA-2p57-rm9w-gvfp) pulled in by apps/mobile dev tooling; the
      # `ip@<=2.0.1: npm:neoip@^3.1.0` override in package.json has since
      # resolved that, and the tree is now clean at every severity, so the scan
      # covers dev dependencies too.
      #
      # Follow-up: tighten AUDIT_THRESHOLD to HIGH once we're comfortable that a
      # new dev-only advisory blocking PRs is an acceptable trade.
      - name: Install osv-scanner
        run: bash scripts/security/install-osv-scanner.sh

      - name: Run dependency audit (critical gate)
        run: bash scripts/security/check-npm-audit.sh

      - name: Run supply-chain hardening guard
        run: bash scripts/security/check-supply-chain-hardening.sh

      - name: Run M365 signing secret runtime smoke
        run: bash scripts/security/check-m365-graph-read-runtime.sh

      - name: Run relay/edge hardening guard
        run: bash scripts/security/check-relay-edge-hardening.sh

      - name: Run customer-PII guard
        run: bash scripts/security/check-customer-pii.sh

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build --filter=@breeze/api

      - name: Verify expected dist artefacts exist
        # tsup config defines named entries — a regression to a single
        # entry would silently drop dist/scripts/recover-stuck-agents.cjs
        # (the runbook target), and a typo there could move dist/index.cjs
        # off the path the production Dockerfile CMDs at. Fail loudly.
        run: |
          test -f apps/api/dist/index.cjs || { echo "missing apps/api/dist/index.cjs"; exit 1; }
          test -f apps/api/dist/scripts/recover-stuck-agents.cjs || { echo "missing apps/api/dist/scripts/recover-stuck-agents.cjs"; exit 1; }
          echo "Both expected dist artefacts present"

      - name: Upload API artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  build-m365-graph-read-executor:
    name: Build M365 Graph Read Executor
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck executor
        run: pnpm --filter=@breeze/m365-graph-read-executor exec tsc --noEmit

      - name: Build executor
        run: pnpm --filter=@breeze/m365-graph-read-executor build

      - name: Verify executor entrypoint exists
        run: test -s apps/m365-graph-read-executor/dist/index.cjs

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm build --filter=@breeze/web

      - name: Install Chromium for CSP guard
        run: pnpm --filter @breeze/web exec playwright install --with-deps chromium

      - name: CSP drift guard (real-browser)
        run: pnpm --filter @breeze/web run csp:guard

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  build-portal:
    name: Build Portal
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build with the production base path so a broken /portal link or asset ref
      # fails CI here rather than in prod.
      - name: Build Portal
        env:
          PORTAL_BASE_PATH: /portal
        run: pnpm build --filter=@breeze/portal

      - name: Upload Portal artifact
        uses: actions/upload-artifact@v7
        with:
          name: portal-dist
          path: apps/portal/dist
          retention-days: 7

  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
            cgo: '0'
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            suffix: ''
            cgo: '0'
            runner: ubuntu-latest
          - goos: darwin
            goarch: arm64
            suffix: ''
            cgo: '1'
            runner: macos-latest
          - goos: windows
            goarch: amd64
            suffix: '.exe'
            cgo: '0'
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Build Agent
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ github.sha }}
          CGO_LDFLAGS_ALLOW: '-weak_framework|ScreenCaptureKit'
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "breeze-agent-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-agent

      # Windows-only: build the GUI-subsystem user-helper so the scheduled task
      # that launches it at logon does not allocate a visible console window.
      # cmd/breeze-user-helper is a thin wrapper over the same internal/agentapp
      # code as breeze-agent; it lives in its own cmd package so it can embed an
      # asInvoker manifest instead of the agent's requireAdministrator (#949).
      # See agent/Makefile (build-windows-user-helper) for the local equivalent.
      # NOTE: this compile check does not run go-winres, so no manifest is
      # embedded here — the manifest regression guard lives in release.yml.
      - name: Build user-helper (Windows only)
        if: matrix.goos == 'windows'
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ github.sha }}
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION} -H windowsgui" \
            -o "breeze-user-helper-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-user-helper

      - name: Upload Agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 7

      - name: Upload user-helper artifact (Windows only)
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: breeze-user-helper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-user-helper-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 7

  # PR-gating manifest guard (#949). The compile job above does not run
  # go-winres, so it embeds no manifest and cannot catch a wrong execution
  # level. The shipped invariant is also asserted in release.yml, but that runs
  # only at release time — this job fails the PR instead. It cross-compiles from
  # Linux (go-winres + the .syso are host-independent) so no Windows runner is
  # needed. breeze-user-helper MUST be asInvoker (an admin manifest reintroduces
  # the ERROR_ELEVATION_REQUIRED spawn failure) and breeze-agent MUST stay
  # requireAdministrator — both directions are checked.
  agent-windows-manifest-guard:
    name: Agent Windows manifest guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Assert Windows manifests
        working-directory: agent
        run: |
          set -euo pipefail
          go install github.com/tc-hib/go-winres@v0.3.3
          export PATH="$PATH:$(go env GOPATH)/bin"
          make build-winres VERSION=ci-guard
          GOOS=windows GOARCH=amd64 go build -ldflags "-H windowsgui" -o /tmp/breeze-user-helper.exe ./cmd/breeze-user-helper
          GOOS=windows GOARCH=amd64 go build -o /tmp/breeze-agent.exe ./cmd/breeze-agent
          uh=$(grep -a -o '<requestedExecutionLevel[^/]*/>' /tmp/breeze-user-helper.exe | head -1 || true)
          ag=$(grep -a -o '<requestedExecutionLevel[^/]*/>' /tmp/breeze-agent.exe | head -1 || true)
          echo "user-helper manifest: ${uh:-<none>}"
          echo "agent manifest:       ${ag:-<none>}"
          echo "$uh" | grep -q 'asInvoker'          || { echo "::error::breeze-user-helper is not asInvoker — would reintroduce #949 (ERROR_ELEVATION_REQUIRED on filtered-token sessions)"; exit 1; }
          if echo "$uh" | grep -q 'requireAdministrator'; then echo "::error::breeze-user-helper is requireAdministrator (#949)"; exit 1; fi
          echo "$ag" | grep -q 'requireAdministrator' || { echo "::error::breeze-agent lost its requireAdministrator manifest"; exit 1; }
          if echo "$ag" | grep -q 'asInvoker'; then echo "::error::breeze-agent became asInvoker — lost requireAdministrator (#949)"; exit 1; fi
          echo "Manifest guard OK: user-helper=asInvoker, agent=requireAdministrator"

  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Run Go tests
        working-directory: agent
        run: CGO_ENABLED=0 go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: agent-coverage
          path: agent/coverage.out
          retention-days: 7

  test-agent-windows:
    name: Test Agent (Windows)
    runs-on: windows-latest
    needs: [lint]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      # CGO_ENABLED=0 is required, not incidental. internal/remote/desktop is a
      # non-cgo package on Windows: comVtblFn, dxgiCapturer and procDeleteObject
      # are defined in files tagged `windows && !cgo`, while audio_windows.go,
      # cursor_windows.go, gpu_convert_windows.go, monitor_windows.go and
      # dxgi_dirty_rects_windows.go use them under a plain `windows` tag.
      # windows-latest ships gcc, so CGO_ENABLED defaults to 1 there and the
      # package fails to compile — and heartbeat/agentapp import it transitively,
      # so they need cgo off too.
      #
      # This list is explicit rather than ./... because Windows CI has never run
      # before this job, so //go:build windows tests across the repo have never
      # executed anywhere and many are red. Verified on windows-latest and a
      # Windows Server 2022 host, ALL pre-existing on main (none touched by the
      # branch that added this job):
      #
      #   internal/heartbeat  - TestSendHelperTokenUpdateOnlyReachesAssistSessions,
      #                         TestHandleHelperSessionAuthenticatedPushesOnlyToAssist,
      #                         TestReconcileUserHelper_UnexpectedStatError_NoDownload,
      #                         TestResolveRunAsSessionUserPrefersRunAsUserScope
      #   internal/agentapp   - TestStaticUnitMatchesEmbedded
      #   internal/config     - TestPersistedServerURLProviderFollowsPromotion
      #   also red under ./... : internal/backup{,/providers,/systemstate},
      #                          peripheral, procoutput, remote/{desktop,filedrop,tools},
      #                          updater
      #
      # Those packages are excluded so this gate reports on code that is actually
      # green, rather than being red on inherited debt and therefore ignored.
      # Fixing them and widening to ./... is tracked in #2523, which records the
      # root cause of each failure.
      #
      # ./internal/eventlog IS listed and IS green: its tests previously ran on no
      # platform at all (Linux skips them via build tag, and `go build` never
      # compiles _test.go), which is the exact gap this job was added to close.
      # When adding a package with //go:build windows tests, add it here.
      - name: Run Windows Go tests
        working-directory: agent
        env:
          CGO_ENABLED: "0"
        run: go test ./internal/sessionbroker ./internal/eventlog ./internal/watchdog ./cmd/breeze-watchdog

      # -race requires cgo, which remote/desktop cannot satisfy on Windows, so
      # this covers only packages that do not import it (heartbeat and agentapp
      # do, transitively). Same package set as the step above: sessionbroker is
      # the concurrency-critical one — session-keyed helper admission, the
      # lifecycle registry, and Job Object ownership all live there — so it is
      # the one that most needs the detector on the OS it actually ships to.
      - name: Run Windows race tests
        working-directory: agent
        run: go test -race ./internal/sessionbroker ./internal/eventlog ./internal/watchdog ./cmd/breeze-watchdog

  # ─── Go agent lint ────────────────────────────────────────────────────
  # The `lint` job above is JS/TS + compose guards only; the Go agent was
  # never vet/lint-gated in CI (golangci-lint lived only in agent/Makefile).
  # `go vet` is an unconditional gate (the tree is already vet-clean).
  # golangci-lint runs in new-issues-only mode so the pre-existing backlog
  # (incl. ~20 unformatted files) does not block PRs — burn it down separately.
  lint-agent:
    name: Lint Agent (Go)
    runs-on: ubuntu-latest
    # CGO off (matches test-agent): the agent's only cgo files are the linux
    # X11/pcap capture backends, whose C headers are not on the runner. vet +
    # lint cover the CGO-off build; the cgo backends are compiled by build-agent.
    env:
      CGO_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: go vet
        working-directory: agent
        run: go vet ./...

      - name: golangci-lint (new issues only)
        working-directory: agent
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run --new-from-rev="origin/${BASE_REF}" ./...

  # ─── Go agent race tests (broad) ──────────────────────────────────────
  # test-agent runs the suite CGO-off (no race detector). This job races the
  # ENTIRE agent tree so new concurrency-heavy packages are covered
  # automatically without a hand-maintained list (~80s). The race detector
  # requires CGO; it runs on macOS to match the repo's only cgo agent build
  # (build-agent darwin) — the linux agent is never cgo-built in CI, and the
  # concurrency logic under test is platform-independent. Windows-only
  # concurrency is covered by the agent's own windows race jobs.
  test-agent-race:
    name: Test Agent (race)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: go test -race ./...
        working-directory: agent
        env:
          CGO_LDFLAGS_ALLOW: '-weak_framework|ScreenCaptureKit'
        run: CGO_ENABLED=1 go test -race -count=1 ./...

  # ─── Windows runtime smoke (#1000) ────────────────────────────────────
  # CI cross-compiles the Windows agent (build-agent matrix) but never RAN
  # it on Windows, so runtime-only Windows regressions shipped green. This
  # bit the v0.68.x line twice — most severely #999, where a nil context
  # passed to the PAM ETW consumer panicked `cannot create context from nil
  # parent` on EVERY Windows agent at startup (dead-on-arrival), caught only
  # by manual VM testing.
  #
  # This job natively boots the built breeze-agent.exe on a windows-latest
  # runner against a throwaway enrolled config (an unreachable server URL —
  # heartbeat/websocket failures are non-fatal background retries) with
  # pam_enabled: true so the Windows-only ETW subscriber path actually runs.
  # It then asserts the agent (a) logs "agent is running" within a deadline,
  # (b) stays up a grace window without exiting, and (c) emits no Go panic.
  # `breeze-agent start` launched from a shell is NOT detected as an SCM
  # service (svc.IsWindowsService() == false), so it takes the console path
  # straight into startAgent — the same pipeline that panicked in #999.
  #
  # Scope is deliberately the minimal valuable slice from #1000. The stretch
  # items in that issue — scripted MSI install/upgrade smoke (Error-1920
  # service-start failures) and a DB upgrade smoke from the prior release
  # tag (the #998 checksum class) — are intentionally NOT covered here and
  # remain open follow-ups.
  windows-runtime-smoke:
    name: Windows Runtime Smoke
    runs-on: windows-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Build Windows agent
        working-directory: agent
        env:
          CGO_ENABLED: '0'
          BUILD_VERSION: ${{ github.sha }}
        run: |
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION" `
            -o breeze-agent.exe ./cmd/breeze-agent
          if (-not (Test-Path breeze-agent.exe)) { throw "breeze-agent.exe was not produced" }

      - name: Boot agent and assert it stays up
        working-directory: agent
        shell: pwsh
        env:
          # The agent treats Sentry as best-effort; force it off so the smoke
          # never depends on network egress to sentry.io.
          BREEZE_SENTRY_DSN: ''
        run: |
          $ErrorActionPreference = 'Stop'

          # Start from a clean dir so a re-used (self-hosted) runner can't let a
          # previous run's "agent is running" line or absent panic produce a
          # vacuous green. GitHub-hosted windows-latest is ephemeral, but this
          # is cheap insurance and keeps the assertion honest everywhere.
          $smoke = Join-Path $env:RUNNER_TEMP 'breeze-smoke'
          if (Test-Path $smoke) { Remove-Item -Recurse -Force $smoke }
          New-Item -ItemType Directory -Force -Path $smoke | Out-Null
          $cfgPath = Join-Path $smoke 'agent.yaml'
          $logPath = Join-Path $smoke 'agent.log'
          $outPath = Join-Path $smoke 'stdout.log'
          $errPath = Join-Path $smoke 'stderr.log'

          # Throwaway *enrolled* config: a valid (non-real) UUID + token so
          # config.IsEnrolled passes and `start` proceeds into startAgent
          # instead of blocking in waitForEnrollment. server_url points at a
          # closed port — heartbeat/websocket retries are non-fatal. The
          # forward slashes in log_file are YAML-safe and accepted on Windows.
          $logYaml = $logPath -replace '\\','/'
          @"
          server_url: http://127.0.0.1:9
          agent_id: 00000000-0000-4000-8000-000000000001
          auth_token: smoke-ci-token-not-a-real-secret
          log_level: info
          log_format: text
          log_file: $logYaml
          pam_enabled: true
          heartbeat_interval_seconds: 60
          "@ | Set-Content -Path $cfgPath -Encoding ascii
          Write-Host "=== config ==="; Get-Content $cfgPath

          Write-Host "=== launching breeze-agent start ==="
          $proc = Start-Process -FilePath '.\breeze-agent.exe' `
            -ArgumentList @('start','--config', $cfgPath) `
            -RedirectStandardOutput $outPath `
            -RedirectStandardError  $errPath `
            -PassThru

          function Get-AllLogText {
            $parts = @()
            foreach ($p in @($logPath, $outPath, $errPath)) {
              if (Test-Path $p) { $parts += (Get-Content $p -Raw -ErrorAction SilentlyContinue) }
            }
            return ($parts -join "`n")
          }

          # (a) Wait up to 45s for "agent is running", failing fast if the
          # process exits before reaching it.
          $deadline = (Get-Date).AddSeconds(45)
          $running  = $false
          while ((Get-Date) -lt $deadline) {
            if ((Get-AllLogText) -match 'agent is running') { $running = $true; break }
            if ($proc.HasExited) {
              Write-Host "::error::breeze-agent exited (code $($proc.ExitCode)) before logging 'agent is running'"
              break
            }
            Start-Sleep -Seconds 1
          }

          # (b) Hold a grace window and confirm the process is still alive.
          if ($running) {
            Write-Host "agent reached 'agent is running' — holding 8s grace window"
            Start-Sleep -Seconds 8
          }
          $stillAlive = -not $proc.HasExited

          # Stop the agent regardless of outcome so the runner doesn't hang.
          if (-not $proc.HasExited) {
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          # Best-effort wait for clean exit so the redirected log files flush.
          try { $proc.WaitForExit(5000) | Out-Null } catch {}

          $allText = Get-AllLogText
          Write-Host "=== agent.log (tail) ==="
          if (Test-Path $logPath) { Get-Content $logPath -Tail 25 }
          Write-Host "=== stderr ==="
          if (Test-Path $errPath) { Get-Content $errPath }

          # (c) Any Go panic is a hard failure — this is the #999 signal.
          if ($allText -match 'panic:') {
            Write-Host "::error::breeze-agent panicked on startup (the #999 class of regression)"
            exit 1
          }
          if (-not $running) {
            Write-Host "::error::breeze-agent never reached 'agent is running'"
            exit 1
          }
          if (-not $stillAlive) {
            Write-Host "::error::breeze-agent exited during the post-startup grace window"
            exit 1
          }
          Write-Host "Windows runtime smoke passed: agent booted, stayed up, no panic."

  # ─── Rust Check (Tauri apps) ──────────────────────────────────────────
  # The release workflow is the only place the helper/viewer Rust actually
  # compiles — PR CI only runs cargo-audit (an advisory-DB scan). That let a
  # Cargo bump merge "green" and break the release build (the digest-0.11
  # pair: sha2 0.11 + hmac 0.13 vs. the KeyInit trait move). This job closes
  # that blind spot at PR time. Not in the ci-success needs list yet —
  # promote it once its runtime/caching is proven.
  rust-check:
    name: Rust Check (Tauri apps)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tauri system dependencies
        run: |
          # The Azure apt mirror (azure.archive.ubuntu.com) is intermittently
          # degraded and can crawl at 1-4 min/package, blowing this job's
          # timeout before Rust ever compiles — a transient infra flake that
          # reds `main` and fires main-red-alert with zero code signal (#1605).
          # Switch to the canonical mirror and retry update+install with
          # backoff so a slow mirror doesn't masquerade as a build failure.
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' \
            /etc/apt/sources.list \
            /etc/apt/sources.list.d/*.list \
            /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          install_deps() {
            sudo apt-get update && \
            sudo apt-get install -y --no-install-recommends \
              libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          }
          for attempt in 1 2 3; do
            if install_deps; then
              echo "Tauri system dependencies installed (attempt ${attempt})."
              exit 0
            fi
            echo "::warning::apt install failed (attempt ${attempt}/3); retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::Failed to install Tauri system dependencies after 3 attempts."
          exit 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            apps/helper/src-tauri -> target
            apps/viewer/src-tauri -> target

      - name: Check helper
        working-directory: apps/helper/src-tauri
        run: cargo check --locked --all-targets

      - name: Check viewer
        working-directory: apps/viewer/src-tauri
        run: cargo check --locked --all-targets

      # `cargo check` compiles #[cfg(test)] code but never runs it, so until
      # this step existed every Rust unit test in the viewer was documentation.
      # The suite is pure functions — no display server, no Tauri runtime, ~0s.
      # apps/helper/src-tauri has 53 more tests in the same position; they pass
      # on macOS but are unverified on this runner, so wiring them up is left to
      # its own PR rather than gating unrelated work on the outcome.
      - name: Test viewer
        working-directory: apps/viewer/src-tauri
        run: cargo test --locked --lib

  # ─── Rust Check (Windows) ─────────────────────────────────────────────
  # The ubuntu rust-check can't compile [target.'cfg(windows)'] deps (the
  # `windows` crate family) — historically only the release build verified
  # those, so bumps like windows 0.58→0.61 sat unverifiable (#1081). This
  # job closes that gap, but only when Cargo files actually change: it's
  # path-filtered so the windows runner cost isn't paid on every PR.
  # Deliberately NOT in the ci-success needs list — it's usually skipped,
  # and "skipped" vs "passed" handling there isn't worth the complexity.
  rust-check-windows:
    name: Rust Check (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect Cargo changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            cargo:
              - 'apps/helper/src-tauri/**'
              - 'apps/viewer/src-tauri/**'

      - name: Setup Rust
        if: steps.changes.outputs.cargo == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust cache
        if: steps.changes.outputs.cargo == 'true'
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            apps/helper/src-tauri -> target
            apps/viewer/src-tauri -> target

      - name: Check helper (windows)
        if: steps.changes.outputs.cargo == 'true'
        working-directory: apps/helper/src-tauri
        run: cargo check --locked --all-targets

      - name: Check viewer (windows)
        if: steps.changes.outputs.cargo == 'true'
        working-directory: apps/viewer/src-tauri
        run: cargo check --locked --all-targets

  # ─── Integration Tests ────────────────────────────────────────────────
  # The API integration suite against a real Postgres + Redis (the only
  # place RLS, tenant gates, and permission resolution are exercised
  # without mocks). BLOCKING on PRs and main — it lived inside the
  # non-blocking smoke-test job until 2026-06, which let two breakages
  # (#1042's RBAC gate, #1092's org-scope lockout) merge "green" and keep
  # main red for 8 days. No Docker image builds, but the real-DB suite plus
  # RLS coverage regularly needs more than 15 minutes as the migration/test
  # surface grows.
  #
  # Sharded 4 ways with vitest `--shard` (2026-07): the suite had grown to
  # 212 files / ~1170 tests ≈ 21 min of strictly sequential wall clock
  # (fileParallelism stays false — the shared TRUNCATE-based cleanup in
  # setup.ts requires it). Each shard is a full job with its own fresh
  # Postgres/Redis containers, so per-file isolation semantics are
  # unchanged; only the file list is split. Branch protection requires the
  # "CI Success" fan-in, and `needs.integration-test.result` there already
  # aggregates across the matrix (success only if every shard passed).
  integration-test:
    name: Integration Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      # Report every shard's result — a red shard must not cancel the others
      # (same rationale as the no-bail rule inside the suite: masking stacked
      # breakages hid #1092 behind #1042 for a day).
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    # ~1/4 of the suite (~6 min) + env/container setup + one autoMigrate
    # pass. 25 leaves generous headroom for suite growth; before sharding
    # this ceiling had to be raised twice (30→40→55) as the sequential
    # runtime grew.
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start test-stack containers
        run: |
          docker compose -f docker-compose.test.yml up -d
          timeout 60 bash -c 'until docker exec breeze-postgres-test pg_isready -U breeze_test -d breeze_test; do sleep 1; done'
          timeout 60 bash -c 'until docker exec breeze-redis-test redis-cli ping | grep -q PONG; do sleep 1; done'

      - name: Run integration tests
        env:
          # DATABASE_URL_APP is the unprivileged role the integration tests
          # actually hit (set up by autoMigrate's ensureAppRole on first
          # run); DATABASE_URL is the superuser used for seeding +
          # verification reads. See apps/api/src/__tests__/integration/
          # loadEnv.ts for the full contract.
          DATABASE_URL: postgresql://breeze_test:breeze_test@localhost:5433/breeze_test
          DATABASE_URL_APP: postgresql://breeze_app:breeze_test@localhost:5433/breeze_test
          BREEZE_APP_DB_PASSWORD: breeze_test
          POSTGRES_PASSWORD: breeze_test
          REDIS_URL: redis://localhost:6380
          JWT_SECRET: ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          APP_ENCRYPTION_KEY: ci-smoke-Xz9Lm3Kp7Wn2Qr5Tv8Yb0Hd4Fg6Jc1Ae3
          MFA_ENCRYPTION_KEY: ci-smoke-Nm4Rp8Ws2Kv6Tq0Yh3Bd7Fg1Jc5Le9Ax2
          NODE_ENV: test
          # #1828 — fail the build on any contextless db write (the #1375 silent
          # 0-row class). The opt-in gate (#1379 A1) is flipped on suite-wide now
          # that the RLS negative-control tests route their deliberate contextless
          # writes through a raw breeze_app client (getAppDb) instead of the
          # guarded `db` proxy. Production code must always carry an access
          # context, so a genuine offender here is a real bug, not test noise.
          DB_CONTEXTLESS_WRITE_STRICT: 'true'
        # pnpm forwards args after the script name to the script itself, so
        # --shard reaches vitest. Sharding only splits the file list; files
        # within a shard still run sequentially (fileParallelism: false).
        run: pnpm --filter=@breeze/api test:integration --shard=${{ matrix.shard }}/4

      # Dedicated exact-role enforcement runner. The general integration config
      # excludes it because this suite manages a temporary BYPASSRLS role and
      # must not inherit the shared TRUNCATE hooks. The preceding suite has
      # already applied migrations (globalSetup runs autoMigrate on every
      # shard's fresh DB) and ensured the breeze_app login exists. Runs on
      # shard 1 only — it's a single-DB contract check, not a sharded suite.
      - name: Run request database role enforcement tests
        if: matrix.shard == 1
        env:
          DATABASE_URL: postgresql://breeze_test:breeze_test@localhost:5433/breeze_test
          DATABASE_URL_APP: postgresql://breeze_app:breeze_test@localhost:5433/breeze_test
          BREEZE_APP_DB_PASSWORD: breeze_test
          POSTGRES_PASSWORD: breeze_test
          NODE_ENV: test
        run: pnpm --filter=@breeze/api test:request-db-role

      # The rls-coverage contract test inspects pg_catalog to verify every
      # tenant-scoped table has policies covering SELECT/INSERT/UPDATE/DELETE
      # via the right access helper. Runs against the same test DB AFTER
      # the integration suite (whose globalSetup has already triggered
      # autoMigrate). Has its own runner because vitest.integration.config.ts
      # excludes it: the read-only catalog inspection must not be hooked to
      # setup.ts, which TRUNCATEs core tables on beforeEach. Shard 1 only —
      # a single-DB contract check, identical on every shard.
      - name: Run RLS coverage contract test
        if: matrix.shard == 1
        env:
          DATABASE_URL: postgresql://breeze_test:breeze_test@localhost:5433/breeze_test
          DATABASE_URL_APP: postgresql://breeze_app:breeze_test@localhost:5433/breeze_test
          BREEZE_APP_DB_PASSWORD: breeze_test
          POSTGRES_PASSWORD: breeze_test
          JWT_SECRET: ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          APP_ENCRYPTION_KEY: ci-smoke-Xz9Lm3Kp7Wn2Qr5Tv8Yb0Hd4Fg6Jc1Ae3
          MFA_ENCRYPTION_KEY: ci-smoke-Nm4Rp8Ws2Kv6Tq0Yh3Bd7Fg1Jc5Le9Ax2
          NODE_ENV: test
          # #1828 — strict gate on here too. The rls-coverage forge writes all
          # carry a context (withDbAccessContext / withSystemDbAccessContext);
          # the catalog-inspection statements are reads, which the guard ignores.
          DB_CONTEXTLESS_WRITE_STRICT: 'true'
        run: pnpm --filter=@breeze/api test:rls-coverage

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail=200 || true

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

  # ─── Smoke Test ───────────────────────────────────────────────────────
  # Builds Docker images, starts the full stack, and verifies:
  #   1. DB + Redis connectivity (health/ready)
  #   2. Login + JWT issuance
  #   3. Authenticated API endpoints (exercises core DB tables)
  #   4. Web page loads (SSR rendering works)
  # Non-blocking on PRs (continue-on-error), required on main pushes.
  # The API integration suite used to run here too — it now has its own
  # BLOCKING integration-test job above; this job is purely the Docker
  # image build + stack boot + endpoint smoke.
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          BREEZE_VERSION=ci-smoke
          POSTGRES_PASSWORD=smoketest
          REDIS_PASSWORD=ci-smoke-redis-pw
          JWT_SECRET=ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          # Required in production by config/validate.ts (#2506) — signs
          # partner reconstruction export cursors. 32 random bytes, base64.
          PARTNER_API_CURSOR_SIGNING_KEY=nJ4B7uS2xielQGyxLoBLcPCPey5FyilPeVQbGL10CDo=
          AGENT_ENROLLMENT_SECRET=ci-smoke-agent-enrollment-Hy4Bz9Mp2Wq6Tv0Lk3
          BREEZE_BOOTSTRAP_ADMIN_EMAIL=ci-admin@breeze.local
          BREEZE_BOOTSTRAP_ADMIN_PASSWORD=ci-smoke-bootstrap-credential-32-chars
          APP_ENCRYPTION_KEY=e9367714341ea19491ff7cd095d1a97e15ae3f7962416723ecfb29a89ed71eb9
          MFA_ENCRYPTION_KEY=e86f8b88f2c058d428de55c4abec1b50a3cd960a7205dffdb65be8130abbb777
          ENROLLMENT_KEY_PEPPER=ci-smoke-enrollment-pepper-Hy4Bz9Mp2Wq6Tv0Lk3
          MFA_RECOVERY_CODE_PEPPER=ci-smoke-mfa-recovery-pepper-Nq8Zx2Vm5Tr9Lp1
          BREEZE_DOMAIN=localhost
          ACME_EMAIL=ci@breeze.local
          TURN_SECRET=ci-smoke-turn-secret
          TURN_HOST=127.0.0.1
          TRUST_PROXY_HEADERS=false
          # Image refs — base docker-compose.yml requires these via ${VAR:?...}.
          # The CI override builds api/web from source and disables caddy/coturn,
          # but Compose still parses interpolation in the base file before
          # profile filtering, so all refs must resolve. Mutable tags are fine
          # here since this stack is ephemeral (torn down in Teardown step).
          BREEZE_API_IMAGE_REF=ghcr.io/lanternops/breeze/api:latest
          BREEZE_WEB_IMAGE_REF=ghcr.io/lanternops/breeze/web:latest
          BREEZE_PORTAL_IMAGE_REF=ghcr.io/lanternops/breeze/portal:latest
          BREEZE_BINARIES_IMAGE_REF=ghcr.io/lanternops/breeze/binaries:latest
          CADDY_IMAGE_REF=caddy:2-alpine
          POSTGRES_IMAGE_REF=postgres:16-alpine
          REDIS_IMAGE_REF=redis:7-alpine
          COTURN_IMAGE_REF=coturn/coturn:latest
          # Required in production by config/validate.ts (#625) — without
          # this, agents would accept unsigned release manifests. CI uses
          # the well-known test pubkey from ci-smoke-binary-source-*.yml.
          RELEASE_ARTIFACT_MANIFEST_PUBLIC_KEYS=yzx8ftmcls6uBetFC5SYnZhBo+cbur3IX50TbBthTso=
          # Required in production by config/validate.ts (#570) — distinguishes
          # hosted SaaS from self-hosted, gates the email-verification flow on
          # /auth/register-partner. CI runs in self-hosted mode.
          IS_HOSTED=false
          EOF

      - name: Build and start containers
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml.ci up --build -d

      - name: Wait for API ready (DB + Redis)
        run: |
          echo "Waiting for API readiness (DB + Redis)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/health/ready 2>/dev/null; do sleep 2; done'
          curl -s http://localhost:3001/health/ready | jq .
          echo "API is ready."

      - name: Wait for Web health
        run: |
          echo "Waiting for Web on :4321..."
          timeout 120 bash -c 'until curl -sf http://localhost:4321/ 2>/dev/null; do sleep 2; done'
          echo "Web is healthy."

      - name: Wait for Portal health (/portal)
        run: |
          echo "Waiting for Portal on :4322/portal/login..."
          timeout 120 bash -c 'until curl -sf http://localhost:4322/portal/login 2>/dev/null; do sleep 2; done'
          echo "Portal is healthy."
          # The portal must NOT answer outside its base path (web owns the root).
          ROOT_LOGIN=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4322/login || true)
          echo "Portal GET /login (expect 404) -> ${ROOT_LOGIN}"
          if [ "${ROOT_LOGIN}" != "404" ]; then
            echo "ERROR: portal answered un-based path /login with ${ROOT_LOGIN} (expected 404)"
            exit 1
          fi

      - name: Login and export token
        id: login
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3001/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci-admin@breeze.local","password":"ci-smoke-bootstrap-credential-32-chars"}')
          TOKEN=$(echo "${RESPONSE}" | jq -r '.tokens.accessToken // .token // .accessToken // empty')
          if [ -z "${TOKEN}" ]; then
            echo "Login failed — no token in response"
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Login successful."

      - name: Smoke test API endpoints
        env:
          TOKEN: ${{ steps.login.outputs.token }}
          API: http://localhost:3001/api/v1
        run: |
          FAIL=0
          PASS_COUNT=0
          FAIL_COUNT=0
          smoke() {
            local name=$1 url=$2 expected_status=${3:-200}
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${TOKEN}" "${url}")
            if [ "${STATUS}" = "${expected_status}" ]; then
              echo "  PASS  ${name} (${STATUS})"
              PASS_COUNT=$((PASS_COUNT + 1))
            else
              echo "  FAIL  ${name} — expected ${expected_status}, got ${STATUS}"
              FAIL=1
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          }

          echo "=== API Endpoint Smoke Tests ==="

          # ── Devices & Hardware ──
          smoke "GET /devices"                  "${API}/devices"
          smoke "GET /device-groups"            "${API}/device-groups"
          smoke "GET /tags"                     "${API}/tags"
          smoke "GET /custom-fields"            "${API}/custom-fields"
          smoke "GET /filters"                  "${API}/filters"

          # ── Monitoring & Alerts ──
          smoke "GET /alerts"                   "${API}/alerts"
          smoke "GET /monitors"                 "${API}/monitors"

          # ── Organizations & Users ──
          smoke "GET /orgs"                     "${API}/orgs"
          smoke "GET /users"                    "${API}/users"
          smoke "GET /roles"                    "${API}/roles"
          smoke "GET /api-keys"                 "${API}/api-keys"
          smoke "GET /enrollment-keys"          "${API}/enrollment-keys"

          # ── Scripts & Automation ──
          smoke "GET /scripts"                  "${API}/scripts"
          smoke "GET /automations"              "${API}/automations"
          smoke "GET /playbooks"                "${API}/playbooks"

          # ── Patching & Policies ──
          smoke "GET /patches"                  "${API}/patches"
          smoke "GET /patch-policies"           "${API}/patch-policies"
          smoke "GET /update-rings"             "${API}/update-rings"
          smoke "GET /policies"                 "${API}/policies"
          smoke "GET /configuration-policies"   "${API}/configuration-policies"

          # ── Software & Inventory ──
          smoke "GET /software-policies"        "${API}/software-policies"
          smoke "GET /software-inventory"       "${API}/software-inventory"

          # ── Security & Compliance ──
          smoke "GET /audit-logs"               "${API}/audit-logs"
          smoke "GET /audit-baselines"          "${API}/audit-baselines"
          smoke "GET /access-reviews"           "${API}/access-reviews"
          smoke "GET /reliability"              "${API}/reliability"

          # ── Network ──
          smoke "GET /network/baselines"        "${API}/network/baselines"
          smoke "GET /network/changes"          "${API}/network/changes"

          # ── Deployment & Webhooks ──
          smoke "GET /deployments"              "${API}/deployments"
          smoke "GET /webhooks"                 "${API}/webhooks"

          # ── Reports & Notifications ──
          smoke "GET /reports"                  "${API}/reports"
          smoke "GET /notifications"            "${API}/notifications"
          smoke "GET /changes"                  "${API}/changes"

          echo ""
          echo "Results: ${PASS_COUNT} passed, ${FAIL_COUNT} failed"
          if [ "${FAIL}" -ne 0 ]; then
            echo "One or more API smoke tests failed"
            exit 1
          fi
          echo "All API smoke tests passed."

      - name: Smoke test web pages
        run: |
          FAIL=0
          smoke_page() {
            local name=$1 path=$2
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:4321${path}")
            if [ "${STATUS}" = "200" ]; then
              echo "  PASS  ${name} (${STATUS})"
            else
              echo "  FAIL  ${name} — expected 200, got ${STATUS}"
              FAIL=1
            fi
          }

          echo "=== Web Page Smoke Tests ==="

          smoke_page "Dashboard"     "/"
          smoke_page "Login"         "/login"
          smoke_page "Devices"       "/devices"
          smoke_page "Alerts"        "/alerts"
          smoke_page "Scripts"       "/scripts"
          smoke_page "Automations"   "/automations"
          smoke_page "Patches"       "/patches"
          smoke_page "Policies"      "/policies"
          smoke_page "Discovery"     "/discovery"
          smoke_page "Reports"       "/reports"
          smoke_page "Settings"      "/settings"

          if [ "${FAIL}" -ne 0 ]; then
            echo "One or more page smoke tests failed"
            exit 1
          fi
          echo "All page smoke tests passed."

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml.ci logs --tail=200 || true

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml.ci down -v || true

  # Summary job that depends on all other jobs for branch protection
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-api, test-m365-graph-read-executor, test-web, test-portal, test-office-addin-core, test-excel-addin, test-word-addin, test-powerpoint-addin, test-outlook-addin, security-audit, build-api, build-m365-graph-read-executor, build-web, build-portal, build-agent, test-agent, test-agent-windows, windows-runtime-smoke, integration-test, check-migrations-nonsuperuser, rust-check, smoke-test]
    if: ${{ !cancelled() }}
    steps:
      - name: Check all jobs passed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_API_RESULT: ${{ needs.test-api.result }}
          TEST_M365_GRAPH_READ_EXECUTOR_RESULT: ${{ needs.test-m365-graph-read-executor.result }}
          TEST_WEB_RESULT: ${{ needs.test-web.result }}
          TEST_PORTAL_RESULT: ${{ needs.test-portal.result }}
          TEST_OFFICE_ADDIN_CORE_RESULT: ${{ needs.test-office-addin-core.result }}
          TEST_EXCEL_ADDIN_RESULT: ${{ needs.test-excel-addin.result }}
          TEST_WORD_ADDIN_RESULT: ${{ needs.test-word-addin.result }}
          TEST_POWERPOINT_ADDIN_RESULT: ${{ needs.test-powerpoint-addin.result }}
          TEST_OUTLOOK_ADDIN_RESULT: ${{ needs.test-outlook-addin.result }}
          SECURITY_AUDIT_RESULT: ${{ needs.security-audit.result }}
          BUILD_API_RESULT: ${{ needs.build-api.result }}
          BUILD_M365_GRAPH_READ_EXECUTOR_RESULT: ${{ needs.build-m365-graph-read-executor.result }}
          BUILD_WEB_RESULT: ${{ needs.build-web.result }}
          BUILD_PORTAL_RESULT: ${{ needs.build-portal.result }}
          BUILD_AGENT_RESULT: ${{ needs.build-agent.result }}
          TEST_AGENT_RESULT: ${{ needs.test-agent.result }}
          TEST_AGENT_WINDOWS_RESULT: ${{ needs.test-agent-windows.result }}
          WINDOWS_RUNTIME_SMOKE_RESULT: ${{ needs.windows-runtime-smoke.result }}
          INTEGRATION_TEST_RESULT: ${{ needs.integration-test.result }}
          CHECK_MIGRATIONS_NONSUPERUSER_RESULT: ${{ needs.check-migrations-nonsuperuser.result }}
          RUST_CHECK_RESULT: ${{ needs.rust-check.result }}
          SMOKE_TEST_RESULT: ${{ needs.smoke-test.result }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          if [[ "${LINT_RESULT}" != "success" ]] || \
             [[ "${TYPECHECK_RESULT}" != "success" ]] || \
             [[ "${TEST_API_RESULT}" != "success" ]] || \
             [[ "${TEST_M365_GRAPH_READ_EXECUTOR_RESULT}" != "success" ]] || \
             [[ "${TEST_WEB_RESULT}" != "success" ]] || \
             [[ "${TEST_PORTAL_RESULT}" != "success" ]] || \
             [[ "${TEST_OFFICE_ADDIN_CORE_RESULT}" != "success" ]] || \
             [[ "${TEST_EXCEL_ADDIN_RESULT}" != "success" ]] || \
             [[ "${TEST_WORD_ADDIN_RESULT}" != "success" ]] || \
             [[ "${TEST_POWERPOINT_ADDIN_RESULT}" != "success" ]] || \
             [[ "${TEST_OUTLOOK_ADDIN_RESULT}" != "success" ]] || \
             [[ "${SECURITY_AUDIT_RESULT}" != "success" ]] || \
             [[ "${BUILD_API_RESULT}" != "success" ]] || \
             [[ "${BUILD_M365_GRAPH_READ_EXECUTOR_RESULT}" != "success" ]] || \
             [[ "${BUILD_WEB_RESULT}" != "success" ]] || \
             [[ "${BUILD_PORTAL_RESULT}" != "success" ]] || \
             [[ "${BUILD_AGENT_RESULT}" != "success" ]] || \
             [[ "${TEST_AGENT_RESULT}" != "success" ]] || \
             [[ "${TEST_AGENT_WINDOWS_RESULT}" != "success" ]] || \
             [[ "${WINDOWS_RUNTIME_SMOKE_RESULT}" != "success" ]] || \
             [[ "${INTEGRATION_TEST_RESULT}" != "success" ]] || \
             [[ "${CHECK_MIGRATIONS_NONSUPERUSER_RESULT}" != "success" ]] || \
             [[ "${RUST_CHECK_RESULT}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          # Smoke test: non-blocking on PRs, required on main
          if [[ "${IS_PR}" != "true" ]] && [[ "${SMOKE_TEST_RESULT}" != "success" ]]; then
            echo "Smoke test failed on main branch push"
            exit 1
          fi
          echo "All required jobs passed!"

  # ─── Main-red alerting ────────────────────────────────────────────────
  # Main was red for 8 days in June 2026 and nobody noticed, partly
  # because the dependabot merge storms cancel most main runs and partly
  # from alert fatigue. This keeps exactly one open `ci-red` issue while
  # main is red and auto-closes it when main goes green — red is loud,
  # green is silent, and a perpetually-open issue means "act now".
  # Cancelled runs are ignored (they say nothing about main's health).
  main-red-alert:
    name: Main Red Alert
    runs-on: ubuntu-latest
    needs: [ci-success]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      issues: write
    steps:
      - name: Open, update, or close the ci-red tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.ci-success.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          gh label create ci-red --repo "$GITHUB_REPOSITORY" \
            --color B60205 --description "CI is failing on main" 2>/dev/null || true
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label ci-red --state open \
            --json number --jq ".[0].number // empty")
          short_sha="${SHA:0:8}"
          case "$RESULT" in
            success)
              if [ -n "$existing" ]; then
                gh issue close "$existing" --repo "$GITHUB_REPOSITORY" \
                  --comment "Main is green again as of \`$short_sha\`: $RUN_URL"
              fi
              ;;
            failure)
              if [ -n "$existing" ]; then
                gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
                  --body "Still red at \`$short_sha\`: $RUN_URL"
              else
                body=$(printf "CI failed on a main push at \`%s\`.\n\nRun: %s\n\nThis issue is managed by the main-red-alert job: it stays open while main is red and closes automatically on the next green main run." "$short_sha" "$RUN_URL")
                gh issue create --repo "$GITHUB_REPOSITORY" --label ci-red \
                  --title "CI is red on main" \
                  --body "$body"
              fi
              ;;
            *)
              echo "ci-success result is '$RESULT' (cancelled/skipped) — no signal about main health, doing nothing."
              ;;
          esac
