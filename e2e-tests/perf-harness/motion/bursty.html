<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Breeze RD perf bursty motion source</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;cursor:none}
  canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Bursty motion source: animates high-motion content for ACTIVE_MS, then STOPS
// drawing entirely (cancelAnimationFrame, no rAF) for IDLE_MS, looping forever.
//
// The idle window is the point: with nothing presented, the compositor produces
// no new frame, DXGI Desktop Duplication reports "no new frame", and the agent
// SKIPS encoding frames. That is exactly when the RTP media-clock pacing bug
// manifests (the encoder stamps skipped frames with a fixed 1/fps increment
// instead of real elapsed time), so the perf harness's mediaClockDriftMs grows.
//
// Motion is driven by a frame COUNTER (not wall-clock or random) so the active
// windows are reproducible. Idle windows are intentionally frozen: we paint ONE
// final frame at the active→idle transition (to flip the HUD to IDLE), then
// present nothing until the next active window.
//
// Knobs (URL query, ms):  ?active=1500&idle=1500
const params = new URLSearchParams(location.search);
function knob(name, dflt) {
  const v = Number(params.get(name));
  return Number.isFinite(v) && v > 0 ? v : dflt;
}
const ACTIVE_MS = knob('active', 1500);
const IDLE_MS = knob('idle', 1500);

const cv = document.getElementById('c');
const ctx = cv.getContext('2d', { alpha: false });
let W = 0, H = 0;
function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

let f = 0;                 // frame counter → deterministic positions
let state = 'ACTIVE';
let rafId = null;

const N = 240;             // moving blocks (spatial + temporal complexity)
const blocks = [];
for (let i = 0; i < N; i++) {
  blocks.push({
    bx: (i * 137) % 1000 / 1000, by: (i * 331) % 1000 / 1000,
    sx: 0.6 + (i % 7) * 0.13, sy: 0.5 + (i % 5) * 0.17,
    hue: (i * 47) % 360, w: 40 + (i % 6) * 22, h: 30 + (i % 5) * 26
  });
}

// Paint the full scene at the current frame counter. Called every rAF tick while
// ACTIVE, and exactly once at the moment we enter IDLE.
function paint(){
  // scrolling gradient background (whole-frame change every frame)
  const g = ctx.createLinearGradient(0, (f*3)%H, W, ((f*3)%H)+H);
  g.addColorStop(0, `hsl(${(f*2)%360},60%,12%)`);
  g.addColorStop(1, `hsl(${(f*2+120)%360},60%,20%)`);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  // moving high-contrast blocks
  for (const b of blocks){
    const x = ((b.bx + Math.sin((f*0.01)*b.sx + b.hue) * 0.5 + 0.5) % 1) * (W - b.w);
    const y = ((b.by + Math.cos((f*0.01)*b.sy + b.hue) * 0.5 + 0.5) % 1) * (H - b.h);
    ctx.fillStyle = `hsl(${(b.hue + f) % 360},90%,55%)`;
    ctx.fillRect(x, y, b.w, b.h);
    ctx.fillStyle = '#000';
    ctx.fillRect(x+6, y+6, b.w-12, b.h-12);
  }
  // scrolling text band (sharp edges stress intra prediction)
  ctx.fillStyle = '#fff'; ctx.font = '28px monospace';
  const line = 'BREEZE REMOTE DESKTOP ENCODER LOAD 0123456789 ';
  const off = (f * 6) % 600;
  for (let row = 0; row < H; row += 60){
    ctx.fillText(line.repeat(6), 40 - off, row + 40);
  }
  drawHud();
}

// Small HUD: ACTIVE/IDLE state + frame count + configured windows. Makes the
// bursty cadence visually obvious (green while moving, red while frozen).
function drawHud(){
  const idle = state === 'IDLE';
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(12, 10, 340, 34);
  ctx.font = '20px monospace';
  ctx.fillStyle = idle ? '#f33' : '#0f0';
  ctx.fillText(`${state}  frame ${f}  (a=${ACTIVE_MS} i=${IDLE_MS}ms)`, 20, 34);
}

function tick(){
  f++;
  paint();
  rafId = requestAnimationFrame(tick);
}

function enterActive(){
  state = 'ACTIVE';
  rafId = requestAnimationFrame(tick);
  setTimeout(enterIdle, ACTIVE_MS);
}

function enterIdle(){
  state = 'IDLE';
  // Stop the animation loop — NO rAF while idle so the captured screen goes
  // genuinely static and the agent starts skipping frames.
  if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  // One final paint to flip the HUD to IDLE; after this we present nothing.
  paint();
  setTimeout(enterActive, IDLE_MS);
}

enterActive();
</script>
</body>
</html>
